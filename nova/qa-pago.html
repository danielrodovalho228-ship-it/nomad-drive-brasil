<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✅ Pagamento confirmado — QA Nomade Drive</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { max-width: 520px; width: 100%; background: #fff; border-radius: 16px; padding: 36px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center; }
  img.logo { height: 48px; margin: 0 auto 24px; display: block; }
  .icon-check { width: 80px; height: 80px; background: #4FA600; color: #fff; border-radius: 50%; margin: 0 auto 22px; display: flex; align-items: center; justify-content: center; font-size: 44px; }
  h1 { font-size: 26px; font-weight: 900; margin-bottom: 10px; }
  p { color: #4a4a4a; font-size: 15px; line-height: 1.55; margin-bottom: 14px; }
  .code-box { background: #FFC72C; border-radius: 14px; padding: 24px; margin: 24px 0; display: none; }
  .code-box.show { display: block; }
  .code-box__label { font-size: 11px; font-weight: 800; color: #1a1a1a; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .code-box__code { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 900; color: #1a1a1a; letter-spacing: 12px; line-height: 1; }
  .status { padding: 14px; border-radius: 8px; font-size: 13.5px; margin: 18px 0; text-align: left; line-height: 1.5; display: none; }
  .status.show { display: block; }
  .status.ok { background: #ecf6e0; color: #2E6100; border: 1px solid #a7d883; }
  .status.err { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
  .status.info { background: #fef9e7; color: #92400e; border: 1px solid #fbbf24; }
  code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
  .btn { padding: 12px 22px; border-radius: 8px; font-weight: 700; font-size: 14px; text-decoration: none; cursor: pointer; border: none; transition: all .15s; }
  .btn--primary { background: #4FA600; color: #fff; }
  .btn--primary:hover { background: #3F8500; }
  .btn--ghost { background: #f5f5f5; color: #1a1a1a; border: 1px solid #cccccc; }
  .btn--ghost:hover { background: #e5e5e5; }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="../images/logo-nomade-drive.jpg" alt="Nomade Drive" />
    <div class="icon-check">✓</div>
    <h1>Pagamento confirmado!</h1>
    <p>Estamos gerando a senha do cofre eletrônico…</p>

    <div class="status" id="status"></div>

    <div class="code-box" id="codeBox">
      <div class="code-box__label">🔐 Sua senha do cofre</div>
      <div class="code-box__code" id="codeValue">----</div>
    </div>

    <p id="bookingInfo" style="font-size:12.5px; color:#767676; font-family:'JetBrains Mono',monospace;"></p>

    <div class="actions">
      <a href="qa-test.html" class="btn btn--primary">🔓 Próximo passo: Desbloquear cofre →</a>
      <a href="qa-test.html" class="btn btn--ghost">Voltar ao console</a>
    </div>
  </div>

<script>
var SUPABASE_URL = 'https://zeexmbgacvsaciojcrwr.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplZXhtYmdhY3ZzYWNpb2pjcndyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjg3ODQsImV4cCI6MjA5NDk0NDc4NH0.wJVJtIxW69_c9uHUTmGeksHAIbBJWKkTWOwZm3ZiqT8';

var params = new URLSearchParams(window.location.search);
var bookingId = params.get('booking');
var sessionId = params.get('session_id');

function showStatus(type, msg) {
  var el = document.getElementById('status');
  el.className = 'status show ' + type;
  el.innerHTML = msg;
}

if (!bookingId) {
  showStatus('err', '❌ Booking ID não encontrado na URL. Volte ao <a href="qa-test.html">console</a>.');
} else {
  document.getElementById('bookingInfo').textContent = 'Booking: ' + bookingId;

  // Auto-dispara confirm_payment
  fetch(SUPABASE_URL + '/functions/v1/qa-acao', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
    body: JSON.stringify({ action: 'confirm_payment', booking_id: bookingId })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(result) {
    if (result.ok && result.data.pickup_code) {
      // Mostra código gigante
      document.getElementById('codeValue').textContent = result.data.pickup_code;
      document.getElementById('codeBox').classList.add('show');
      showStatus('ok', '✅ <strong>E-mail com a senha enviado pro seu inbox.</strong><br>Booking <code>' + bookingId + '</code> confirmado.');
    } else if (result.data.error && result.data.error.indexOf('aguardando pagamento') < 0) {
      showStatus('err', '⚠️ ' + (result.data.error || 'erro desconhecido'));
    } else {
      showStatus('info', '⚠️ Esse booking já foi confirmado antes (status: <code>' + (result.data.status || 'desconhecido') + '</code>).<br>Veja a senha do cofre no e-mail anterior ou no console.');
    }
  })
  .catch(function(e) {
    showStatus('err', '❌ ' + e.message);
  });
}
</script>
</body>
</html>
